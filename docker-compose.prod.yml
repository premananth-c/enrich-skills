# RankerShip Phase 1 — Production stack (API + Redis + Caddy)
# PostgreSQL runs natively on the host; ensure pg_hba.conf allows 172.17.0.0/16
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://enrich:${DB_PASSWORD}@host.docker.internal:5432/enrich_skills
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-invite@rankership.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - INVITE_BASE_URL=${INVITE_BASE_URL:-https://student.rankership.com}
      - STUDENT_WEB_URL=${STUDENT_WEB_URL:-https://student.rankership.com}
      - ADMIN_WEB_URL=${ADMIN_WEB_URL:-https://admin.rankership.com}
      - ALLOWED_STREAMING_DOMAINS=${ALLOWED_STREAMING_DOMAINS:-rankership.com,www.rankership.com,student.rankership.com,admin.rankership.com}
      - SENTRY_DSN=${SENTRY_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  # Judge worker (Phase 3 — coding tests). Uncomment when ready.
  # judge-worker:
  #   build:
  #     context: .
  #     dockerfile: services/judge/Dockerfile
  #   environment:
  #     - DATABASE_URL=postgresql://enrich:${DB_PASSWORD}@host.docker.internal:5432/enrich_skills
  #     - REDIS_URL=redis://redis:6379
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   depends_on:
  #     - redis
  #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
  redis_data:
