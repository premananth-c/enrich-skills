name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/enrich-skills
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache api judge-worker
            docker compose -f docker-compose.prod.yml up -d

            # Apply pending migrations (fails the job if DB is unreachable or migration errors).
            # If you see P3005 on a legacy DB, baseline once on the server — see docs/database-migrations.md
            docker compose -f docker-compose.prod.yml exec -T -w /app/apps/api api \
              npx prisma migrate deploy --schema ./prisma/schema.prisma

            docker system prune -f

  deploy-frontends:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: student-web
            filter: "@enrich-skills/student-web"
          - app: admin-web
            filter: "@enrich-skills/admin-web"
          - app: landing-web
            filter: "@enrich-skills/landing-web"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @enrich-skills/shared build

      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.filter }} build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        working-directory: apps/${{ matrix.app }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
